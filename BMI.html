<!DOCTYPE html>

<html lang = "en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>BMI Calculator</title>
    </head>
    <body style ="background-color:gray">
        <div class="container">
            <h1 class="heading">Body Mass Index (BMI) Calculator</h1>
            Height(cm):
            <input class="input" id="height" type="number" value="180" placeholder="Enter your height in cm">

            Weight(kg)
            <input class="input" id="weight" type="number" value="80" placeholder="Enter your weight in kg">
            <button class="btm" id=""btn>Compute BMI</button>
            <input disable type="text" class="input" id="bmi-result">

            <h4 class="info-text">Weight condition: <span id="weight-condition"></span></h4>


        </div>
    </body>
</html>
